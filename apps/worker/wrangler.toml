name = "bushiri-api"
main = "src/index.ts"
compatibility_date = "2026-04-24"

[vars]
LLM_PROVIDER = "pydantic_ai"
LLM_MODEL = "gemma-3-27b-it"
LLM_PIPELINE_URL = "http://127.0.0.1:8790/parse-market-post"
APP_TIMEZONE = "Asia/Seoul"
RAW_POST_RETENTION_DAYS = "30"
COLLECT_LOOKBACK_HOURS = "30"
CORS_ALLOWED_ORIGINS = "https://bushiri-46o.pages.dev"

[[d1_databases]]
binding = "DB"
database_name = "bushiri"
database_id = "6aff5af0-5886-439d-b1f5-3af265cd1d01"

[triggers]
crons = ["0 23 * * *"]
